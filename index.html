<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS AI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
body {
  font-family: Arial;
  background: #0f0c1d;
  color: white;
  text-align: center;
  padding: 20px;
}
#webcam-container {
  margin-top: 20px;
}
button {
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Rock Paper Scissors AI</h1>

<button onclick="init()" id="startBtn">Start Camera</button>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/5R-D3HTrB/";

let model, webcam, labelContainer, maxPredictions;
let tmImage = window.tmImage;

async function init() {
  const btn = document.getElementById("startBtn");
  btn.innerText = "Loading...";
  btn.disabled = true;

  try {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";

    window.requestAnimationFrame(loop);

    btn.innerText = "Camera Running";
  } catch (err) {
    alert("Error: " + err.message);
    console.error(err);
    btn.innerText = "Retry";
    btn.disabled = false;
  }
}

async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = 0;
  let result = "";

  for (let i = 0; i < prediction.length; i++) {
    const prob = prediction[i].probability;

    if (prob > highest) {
      highest = prob;
      result = prediction[i].className;
    }
  }

  if (highest > 0.6) {
    labelContainer.innerHTML = `<h2>${result}</h2>`;
  } else {
    labelContainer.innerHTML = `<h2>Show hand properly</h2>`;
  }
}
</script>

</body>
</html>
