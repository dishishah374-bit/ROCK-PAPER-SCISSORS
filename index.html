<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rock Paper Scissors</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f0c1d;
  color: white;
  text-align: center;
  padding: 20px;
}
button {
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
#webcam-container { margin-top: 20px; }
#result { margin-top: 20px; font-size: 22px; }
.score { margin-top: 15px; font-size: 18px; }
.hint { margin-top: 10px; font-size: 14px; color: #aaa; }
</style>
</head>

<body>

<h1>🤖 AI Rock Paper Scissors</h1>

<button id="startBtn">Start Camera</button>

<div id="webcam-container"></div>

<p class="hint">✋ Hold your hand steady for 1 second to play</p>

<h2 id="result">Waiting...</h2>

<div class="score">
  You: <span id="userScore">0</span> |
  AI: <span id="aiScore">0</span>
</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/5R-D3HTrB/";

let model, webcam;
let running = false;

let userScore = 0;
let aiScore = 0;

let cooldown = false;
let round = 0;

// stability detection
let stableCount = 0;
let lastDetected = "";

// button event
document.getElementById("startBtn").addEventListener("click", toggleCamera);

async function toggleCamera() {
  if (!running) {
    await startCamera();
  } else {
    stopCamera();
  }
}

async function startCamera() {
  const btn = document.getElementById("startBtn");

  try {
    btn.innerText = "Loading...";
    btn.disabled = true;

    if (!window.tmImage) throw new Error("Library not loaded");

    const tmImage = window.tmImage;

    model = await tmImage.load(
      URL + "model.json",
      URL + "metadata.json"
    );

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();

    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    container.appendChild(webcam.canvas);

    running = true;
    btn.innerText = "Stop Camera";
    btn.disabled = false;

    loop();

  } catch (err) {
    alert("Error: " + err.message);
    console.error(err);

    btn.innerText = "Retry";
    btn.disabled = false;
  }
}

function stopCamera() {
  if (webcam) webcam.stop();

  running = false;
  document.getElementById("webcam-container").innerHTML = "";
  document.getElementById("startBtn").innerText = "Start Camera";
}

async function loop() {
  if (!running) return;

  webcam.update();

  try {
    const prediction = await model.predict(webcam.canvas);

    let best = prediction.reduce((a, b) =>
      a.probability > b.probability ? a : b
    );

    const current = best.className.toLowerCase().trim();
    const confidence = best.probability;

    if (confidence > 0.80) {

      if (current === lastDetected) {
        stableCount++;
      } else {
        stableCount = 0;
        lastDetected = current;
      }

      // trigger only after stable detection
      if (stableCount > 20 && !cooldown) {
        playGame(current);
        stableCount = 0;
      }

    } else {
      stableCount = 0;
      lastDetected = "";
    }

  } catch (e) {
    console.error(e);
  }

  requestAnimationFrame(loop);
}

// alternating game logic
function playGame(user) {
  cooldown = true;
  round++;

  let ai = "";

  if (round % 2 === 1) {
    // user wins
    if (user === "rock") ai = "scissors";
    else if (user === "paper") ai = "rock";
    else ai = "paper";
  } else {
    // ai wins
    if (user === "rock") ai = "paper";
    else if (user === "paper") ai = "scissors";
    else ai = "rock";
  }

  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  let result = "";

  if (user === ai) {
    result = "Draw 😐";
  } else if (
    (user === "rock" && ai === "scissors") ||
    (user === "paper" && ai === "rock") ||
    (user === "scissors" && ai === "paper")
  ) {
    result = "You Win 🎉";
    userScore++;
  } else {
    result = "AI Wins 🤖";
    aiScore++;
  }

  document.getElementById("result").innerHTML =
    `Round ${round}: You: ${cap(user)} | AI: ${cap(ai)} → <b>${result}</b>`;

  document.getElementById("userScore").innerText = userScore;
  document.getElementById("aiScore").innerText = aiScore;

  setTimeout(() => {
    cooldown = false;
  }, 2000);
}
</script>

</body>
</html>
