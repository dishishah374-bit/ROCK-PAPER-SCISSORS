<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rock Paper Scissors</title>

<!-- FIXED CDN (no latest) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f0c1d;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#webcam-container {
  margin-top: 20px;
}

#result {
  margin-top: 20px;
  font-size: 20px;
}

.score {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🤖 AI Rock Paper Scissors</h1>

<button id="startBtn" onclick="init()">Start Camera</button>

<div id="webcam-container"></div>

<div id="result">Waiting...</div>

<div class="score">
  You: <span id="userScore">0</span> |
  AI: <span id="aiScore">0</span>
</div>
<script>
const URL = "https://teachablemachine.withgoogle.com/models/5R-D3HTrB/";

let model, webcam;
let running = false;

async function init() {
  const btn = document.getElementById("startBtn");

  try {
    btn.innerText = "Loading...";
    btn.disabled = true;

    if (!window.tmImage) {
      throw new Error("Library not loaded");
    }

    const tmImage = window.tmImage;

    // Load model
    model = await tmImage.load(
      URL + "model.json",
      URL + "metadata.json"
    );

    // Start webcam
    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();

    // 🔥 FORCE display camera
    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    container.style.display = "block";
    container.appendChild(webcam.canvas);

    running = true;
    btn.innerText = "Running";

    loop();

  } catch (err) {
    alert(err.message);
    console.error(err);

    btn.innerText = "Retry";
    btn.disabled = false;
  }
}

async function loop() {
  if (!running) return;

  webcam.update();

  try {
    const prediction = await model.predict(webcam.canvas);

    let best = prediction.reduce((a, b) =>
      a.probability > b.probability ? a : b
    );

    // 🔥 SHOW OUTPUT ON SCREEN
    document.getElementById("result").innerText =
      best.className + " (" + Math.round(best.probability * 100) + "%)";

  } catch (e) {
    console.error("Prediction error:", e);
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
