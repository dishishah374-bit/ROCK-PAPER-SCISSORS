<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rock Paper Scissors</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
body {
  font-family: Arial;
  background: #0f0c1d;
  color: white;
  text-align: center;
}

button {
  padding: 12px 20px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

#webcam-container {
  margin-top: 20px;
}

#result {
  font-size: 22px;
  margin-top: 20px;
}

.score {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🤖 AI Rock Paper Scissors</h1>

<button onclick="init()" id="startBtn">Start Camera</button>

<div id="webcam-container"></div>

<div id="result">Waiting...</div>

<div class="score">
  You: <span id="userScore">0</span> |
  AI: <span id="aiScore">0</span>
</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/5R-D3HTrB/";

let model, webcam;
let userScore = 0;
let aiScore = 0;

async function init() {
  const btn = document.getElementById("startBtn");
  btn.innerText = "Loading...";
  btn.disabled = true;

  try {
    const tmImage = window.tmImage;

    if (!tmImage) {
      throw new Error("Teachable Machine not loaded");
    }

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

    btn.innerText = "Running";
  } catch (err) {
    alert(err.message);
    console.error(err);
    btn.innerText = "Retry";
    btn.disabled = false;
  }
}

async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = 0;
  let userMove = "";

  prediction.forEach(p => {
    if (p.probability > highest) {
      highest = p.probability;
      userMove = p.className;
    }
  });

  if (highest > 0.7) {
    playGame(userMove);
  }
}

function playGame(user) {
  const choices = ["Rock", "Paper", "Scissors"];
  const ai = choices[Math.floor(Math.random() * 3)];

  let result = "";

  if (user === ai) {
    result = "Draw 😐";
  } else if (
    (user === "Rock" && ai === "Scissors") ||
    (user === "Paper" && ai === "Rock") ||
    (user === "Scissors" && ai === "Paper")
  ) {
    result = "You Win 🎉";
    userScore++;
  } else {
    result = "AI Wins 🤖";
    aiScore++;
  }

  document.getElementById("result").innerHTML =
    `You: ${user} | AI: ${ai} → <b>${result}</b>`;

  document.getElementById("userScore").innerText = userScore;
  document.getElementById("aiScore").innerText = aiScore;
}
</script>

</body>
</html>
