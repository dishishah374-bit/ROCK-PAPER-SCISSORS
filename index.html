<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rock Paper Scissors</title>

<!-- FIXED CDN (no latest) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f0c1d;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#webcam-container {
  margin-top: 20px;
}

#result {
  margin-top: 20px;
  font-size: 20px;
}

.score {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🤖 AI Rock Paper Scissors</h1>

<button id="startBtn" onclick="init()">Start Camera</button>

<div id="webcam-container"></div>

<div id="result">Waiting...</div>

<div class="score">
  You: <span id="userScore">0</span> |
  AI: <span id="aiScore">0</span>
</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/5R-D3HTrB/";

let model, webcam, tmImage;
let userScore = 0;
let aiScore = 0;
let lastMove = "";

// 🔥 Wait until library loads (IMPORTANT FIX)
function waitForTM() {
  return new Promise((resolve, reject) => {
    let tries = 0;
    const check = () => {
      if (window.tmImage) {
        tmImage = window.tmImage;
        resolve();
      } else if (tries > 15) {
        reject("Teachable Machine failed to load");
      } else {
        tries++;
        setTimeout(check, 300);
      }
    };
    check();
  });
}

async function init() {
  const btn = document.getElementById("startBtn");
  btn.innerText = "Loading...";
  btn.disabled = true;

  try {
    await waitForTM(); // ✅ FIX

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

    btn.innerText = "Running";
  } catch (err) {
    alert(err);
    console.error(err);
    btn.innerText = "Retry";
    btn.disabled = false;
  }
}

async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = 0;
  let userMove = "";

  prediction.forEach(p => {
    if (p.probability > highest) {
      highest = p.probability;
      userMove = p.className;
    }
  });

  if (highest > 0.75 && userMove !== lastMove) {
    lastMove = userMove;
    playGame(userMove);
  }
}

function playGame(user) {
  const choices = ["Rock", "Paper", "Scissors"];
  const ai = choices[Math.floor(Math.random() * 3)];

  let result = "";

  if (user === ai) {
    result = "Draw 😐";
  } else if (
    (user === "Rock" && ai === "Scissors") ||
    (user === "Paper" && ai === "Rock") ||
    (user === "Scissors" && ai === "Paper")
  ) {
    result = "You Win 🎉";
    userScore++;
  } else {
    result = "AI Wins 🤖";
    aiScore++;
  }

  document.getElementById("result").innerHTML =
    `You: ${user} | AI: ${ai} → <b>${result}</b>`;

  document.getElementById("userScore").innerText = userScore;
  document.getElementById("aiScore").innerText = aiScore;
}
</script>

</body>
</html>
